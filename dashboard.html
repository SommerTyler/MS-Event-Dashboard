<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dashboard | M+S Eventagentur</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <header class="nav scrolled">
      <a class="nav__logo" href="./landing.html">M+<span class="gold">S</span><span class="nav__logo-sub">Eventagentur</span></a>
      <nav class="nav__links">
        <a class="nav__link" href="./landing.html">Home</a>
        <a class="nav__link active" href="./dashboard.html">Dashboard</a>
      </nav>
      <div class="nav__icons">
        <span class="badge badge--gold" id="welcome-user">Angemeldet</span>
        <button class="btn btn--outline" id="logout-btn" type="button">Logout</button>
      </div>
    </header>

    <section class="section section--deeper dashboard-wrap">
      <div class="container">
        <section class="grid-4 dashboard-stats" id="stats"></section>

        <section class="grid-3 dashboard-grid">
          <article class="card dashboard-wide">
            <h2 class="section-title">Kommende Einsaetze</h2>
            <div class="toolbar">
              <select id="event-filter">
                <option value="all">Alle Standorte</option>
                <option value="Hamburg">Hamburg</option>
                <option value="Berlin">Berlin</option>
                <option value="Muenchen">Muenchen</option>
              </select>
            </div>
            <table>
              <thead>
                <tr>
                  <th>Datum</th>
                  <th>Event</th>
                  <th>Ort</th>
                  <th>Team</th>
                  <th>Status</th>
                </tr>
              </thead>
              <tbody id="event-body"></tbody>
            </table>
          </article>

          <article class="card dashboard-narrow">
            <h2 class="section-title">Offene Aufgaben</h2>
            <ul class="list" id="task-list"></ul>
          </article>
        </section>

        <section class="dashboard-grid">
          <article class="card">
            <h2 class="section-title">Mitarbeiterstatus</h2>
            <table>
              <thead>
                <tr>
                  <th>Name</th>
                  <th>Rolle</th>
                  <th>Naechster Einsatz</th>
                  <th>Status</th>
                </tr>
              </thead>
              <tbody id="staff-body"></tbody>
            </table>
          </article>
        </section>
      </div>
    </section>

    <script src="./dashboard.js"></script>
  </body>
</html>
