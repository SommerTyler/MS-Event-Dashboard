<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dashboard | M+S Eventagentur</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <header class="topbar">
      <div class="container topbar-row">
        <a class="brand" href="./landing.html">M+S Eventagentur</a>
        <div style="display: flex; gap: 0.5rem; align-items: center">
          <span class="pill" id="welcome-user">Angemeldet</span>
          <button class="btn btn-secondary" id="logout-btn" type="button">Logout</button>
        </div>
      </div>
    </header>

    <main class="container" style="padding: 1rem 0 2rem">
      <section class="grid" id="stats"></section>

      <section class="grid" style="margin-top: 0.9rem">
        <article class="card wide">
          <h2 class="section-title">Kommende Einsaetze</h2>
          <div class="toolbar">
            <select id="event-filter">
              <option value="all">Alle Standorte</option>
              <option value="Hamburg">Hamburg</option>
              <option value="Berlin">Berlin</option>
              <option value="Muenchen">Muenchen</option>
            </select>
          </div>
          <table>
            <thead>
              <tr>
                <th>Datum</th>
                <th>Event</th>
                <th>Ort</th>
                <th>Team</th>
                <th>Status</th>
              </tr>
            </thead>
            <tbody id="event-body"></tbody>
          </table>
        </article>

        <article class="card narrow">
          <h2 class="section-title">Offene Aufgaben</h2>
          <ul class="list" id="task-list"></ul>
        </article>
      </section>

      <section class="grid" style="margin-top: 0.9rem">
        <article class="card wide">
          <h2 class="section-title">Mitarbeiterstatus</h2>
          <table>
            <thead>
              <tr>
                <th>Name</th>
                <th>Rolle</th>
                <th>Naechster Einsatz</th>
                <th>Status</th>
              </tr>
            </thead>
            <tbody id="staff-body"></tbody>
          </table>
        </article>
      </section>
    </main>

    <script src="./dashboard.js"></script>
  </body>
</html>
